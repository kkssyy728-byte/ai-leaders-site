name: Security boundaries

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Verify generated static mirrors
        run: node tools/sync-static-mirrors.mjs --check
      - name: Check JavaScript syntax
        run: git ls-files -z '*.js' '*.mjs' | xargs -0 -n1 node --check
      - name: Verify authentication and data boundaries
        run: node tools/verify-security-boundaries.mjs
      - name: Build Cloudflare Pages artifact
        run: node tools/build-cloudflare-pages.mjs
