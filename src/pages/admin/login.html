<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex,nofollow"/>
<title>직원 로그인 | AI리더스협회</title>
<link rel="icon" href="/favicon.ico" type="image/x-icon"/>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.css"/>
<style>
  :root{--brand:#0172fe;--ink:#101828;--muted:#667085;--line:#d0d5dd;--bg:#f4f7fb;--danger:#b42318}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 20% 10%,#e7f1ff,transparent 36%),var(--bg);color:var(--ink);font-family:"Pretendard Variable",Pretendard,system-ui,-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif}
  .login-card{width:min(440px,100%);padding:34px;border:1px solid #e0e6ef;border-radius:18px;background:#fff;box-shadow:0 20px 60px rgba(16,24,40,.10)}
  .brand{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:900}
  .brand-mark{width:38px;height:38px;display:grid;place-items:center;border-radius:10px;background:var(--brand);color:#fff}
  h1{margin:28px 0 0;font-size:28px;line-height:1.25;letter-spacing:-.03em}
  .intro{margin:10px 0 24px;color:var(--muted);font-size:14px;line-height:1.65;word-break:keep-all}
  form{display:grid;gap:15px}
  label{display:grid;gap:7px;color:#344054;font-size:13px;font-weight:800}
  input{width:100%;height:48px;border:1px solid var(--line);border-radius:9px;padding:0 13px;background:#fff;color:var(--ink);font:inherit;outline:none}
  input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(1,114,254,.12)}
  button{height:50px;margin-top:4px;border:0;border-radius:9px;background:var(--brand);color:#fff;font:inherit;font-weight:900;cursor:pointer}
  button:hover{filter:brightness(.96)}
  button:disabled{cursor:wait;opacity:.68}
  .message{margin:0;padding:11px 12px;border-radius:8px;background:#eef5ff;color:#174276;font-size:13px;font-weight:700}
  .message.is-error{background:#fff1f0;color:var(--danger)}
  .help{margin:18px 0 0;color:var(--muted);font-size:12px;line-height:1.65}
  .home{display:inline-block;margin-top:22px;color:var(--brand);font-size:13px;font-weight:800;text-decoration:none}
  @media(max-width:520px){.login-card{padding:28px 22px}h1{font-size:25px}}
</style>
<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.7/dist/umd/supabase.min.js" integrity="sha384-BmlQlKlDvXvKoxkn5OQuUo/aJQCTXeB+Kls6EccBmG4Kf8AXvp89RtO9MtPxP/r5" crossorigin="anonymous"></script>
<script defer src="/assets/supabase-store-common.js?v=20260721-form-submit-1"></script>
<script defer src="/assets/admin-login.js?v=20260719-secure-admin-1"></script>
</head>
<body>
  <main class="login-card">
    <div class="brand"><span class="brand-mark">AI</span><span>AI리더스 직원 관리</span></div>
    <h1>직원 로그인</h1>
    <p class="intro">개인별 회사 계정으로 로그인하면 소속 역할에 맞는 관리 메뉴만 표시됩니다.</p>
    <p class="message" id="staffLoginMessage" role="status" hidden></p>
    <form id="staffLoginForm" novalidate>
      <label for="staffEmail">회사 이메일
        <input id="staffEmail" name="email" type="email" inputmode="email" autocomplete="username" required/>
      </label>
      <label for="staffPassword">비밀번호
        <input id="staffPassword" name="password" type="password" autocomplete="current-password" minlength="8" required/>
      </label>
      <button id="staffLoginSubmit" type="submit">직원 로그인</button>
    </form>
    <p class="help">계정 생성, 권한 변경, 비밀번호 재설정은 총괄 관리자 또는 기술 담당자에게 요청해 주세요. 비밀번호를 여러 사람과 공유하지 마세요.</p>
    <a class="home" href="/">← 홈페이지로 돌아가기</a>
  </main>
</body>
</html>
